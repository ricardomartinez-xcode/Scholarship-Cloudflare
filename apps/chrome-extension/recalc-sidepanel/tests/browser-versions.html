<!doctype html>
<meta charset="utf-8">
<title>ReCalc extension selector confirmation</title>
<main id="results"></main>
<script>
  const versions = [
    {
      name: "main",
      script: "/apps/chrome-extension/recalc-sidepanel/lib/whatsapp/wa-selectors.js",
    },
    {
      name: "composer-first",
      script: "/chrome-extension/variants/composer-first/lib/whatsapp/wa-selectors.js",
    },
    {
      name: "preview-first",
      script: "/chrome-extension/variants/preview-first/lib/whatsapp/wa-selectors.js",
    },
  ];

  function loadScript(src) {
    return new Promise((resolve, reject) => {
      const script = document.createElement("script");
      script.src = src;
      script.onload = resolve;
      script.onerror = () => reject(new Error(`Failed to load ${src}`));
      document.head.append(script);
    });
  }

  function resetFixture() {
    document.body.querySelector("#fixture")?.remove();
    const fixture = document.createElement("section");
    fixture.id = "fixture";

    const documentInput = document.createElement("input");
    documentInput.type = "file";
    documentInput.accept = "application/pdf";
    documentInput.id = "document-input";
    fixture.append(documentInput);

    const mediaInput = document.createElement("input");
    mediaInput.type = "file";
    mediaInput.accept = "image/*";
    mediaInput.id = "media-input";
    fixture.append(mediaInput);

    document.body.append(fixture);
  }

  async function run() {
    const results = [];

    for (const version of versions) {
      window.RecalcWaSelectors = undefined;
      resetFixture();
      await loadScript(`${version.script}?t=${Date.now()}`);

      const selected = window.RecalcWaSelectors?.findAttachmentInput?.("media");
      results.push({
        name: version.name,
        loaded: Boolean(window.RecalcWaSelectors),
        selectedId: selected?.id || null,
        selectedAccept: selected?.accept || null,
        ok: selected?.id === "media-input" && selected?.accept === "image/*",
      });
    }

    const ok = results.every((result) => result.ok);
    document.body.dataset.ok = String(ok);
    document.querySelector("#results").textContent = JSON.stringify({ ok, results });
  }

  run().catch((error) => {
    document.body.dataset.ok = "false";
    document.querySelector("#results").textContent = JSON.stringify({
      ok: false,
      error: error instanceof Error ? error.message : String(error),
    });
  });
</script>
