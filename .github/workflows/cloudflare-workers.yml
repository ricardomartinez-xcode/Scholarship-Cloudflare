name: Deploy Cloudflare Worker

on:
  workflow_run:
    workflows:
      - Cloudflare Preflight
    branches:
      - main
    types:
      - completed

permissions:
  actions: read
  contents: read

concurrency:
  group: cloudflare-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout preflighted source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Check Cloudflare secrets
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_API_TOKEN"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Pin npm
        run: npm install -g npm@11.12.1

      - name: Print tool versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci --foreground-scripts

      - name: Download preflighted Worker artifact
        uses: actions/download-artifact@v5
        with:
          name: open-next-${{ github.event.workflow_run.head_sha }}
          path: apps/web
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Verify preflighted Worker artifact integrity
        run: |
          test -d apps/web/.open-next
          test -d apps/web/.wrangler-bundle
          test -s apps/web/.wrangler-bundle/worker.terser.js
          test -s apps/web/.open-next.sha256
          sha256sum -c apps/web/.open-next.sha256

      - name: Deploy prepared Worker
        working-directory: apps/web
        run: node scripts/deploy-prepared-cloudflare.mjs
