name: Deploy Cloudflare Worker

on:
  workflow_run:
    workflows:
      - Cloudflare Preflight
    branches:
      - main
    types:
      - completed

permissions:
  actions: read
  contents: read

concurrency:
  group: cloudflare-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout preflighted source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Check Cloudflare secrets
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_API_TOKEN"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download preflighted OpenNext artifact
        uses: actions/download-artifact@v5
        with:
          name: open-next-${{ github.event.workflow_run.head_sha }}
          path: .
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Verify preflighted artifact integrity
        run: sha256sum -c apps/web/.open-next.sha256

      - name: Prepare preflighted Cloudflare bundle
        working-directory: apps/web
        run: npm run prepare:cloudflare

      - name: Deploy prepared Worker
        working-directory: apps/web
        run: node scripts/deploy-prepared-cloudflare.mjs
