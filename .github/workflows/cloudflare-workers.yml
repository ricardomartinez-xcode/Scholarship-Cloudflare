name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Cloudflare secrets
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_API_TOKEN"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply D1 migrations
        run: npm run d1:migrations:apply

      - name: Sync D1 core data
        env:
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -n "${DIRECT_URL}${DATABASE_URL_UNPOOLED}${DATABASE_URL}" ]; then
            if ! npm run d1:sync-core; then
              echo "::warning::D1 core data sync failed; continuing with deployment because D1 migrations already completed."
            fi
          else
            echo "Skipping D1 data sync because no Postgres URL secret is configured."
          fi

      - name: Deploy
        run: npm run deploy:cloudflare
