name: Deploy Cloudflare Worker

on:
  workflow_run:
    workflows:
      - quality-release-gate
    branches:
      - main
    types:
      - completed
  workflow_dispatch:
    inputs:
      ref:
        description: "Solo se permite main para producción"
        required: true
        default: "main"
        type: string
      deploy_confirmation:
        description: "Escribe DEPLOY_CLOUDFLARE para habilitar un despliegue manual"
        required: false
        default: ""
        type: string
      apply_d1_migrations:
        description: "Aplicar migraciones D1 durante este despliegue manual"
        required: true
        default: false
        type: boolean
      migration_confirmation:
        description: "Escribe APPLY_D1_MIGRATIONS cuando apply_d1_migrations sea true"
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: cloudflare-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      (github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main') ||
      (github.event_name == 'workflow_dispatch' &&
        inputs.ref == 'main' &&
        inputs.deploy_confirmation == 'DEPLOY_CLOUDFLARE')
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout verified source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.ref }}

      - name: Check Cloudflare secrets
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_API_TOKEN"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Cloudflare bundle
        run: npm run build:cloudflare

      - name: Require migration confirmation
        if: github.event_name == 'workflow_dispatch' && inputs.apply_d1_migrations
        run: |
          test "${{ inputs.migration_confirmation }}" = "APPLY_D1_MIGRATIONS"

      - name: Apply D1 migrations
        if: github.event_name == 'workflow_dispatch' && inputs.apply_d1_migrations
        run: npm run d1:migrations:apply

      - name: Deploy Worker
        run: npm run deploy:cloudflare
