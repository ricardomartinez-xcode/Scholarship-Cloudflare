name: Cloudflare D1 Migrations

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type APLICAR to apply pending D1 migrations remotely.
        required: true
        type: string
      database:
        description: D1 database name.
        required: true
        default: recalc-cloudflare
        type: string

permissions:
  contents: read

concurrency:
  group: cloudflare-d1-migrations-production
  cancel-in-progress: false

jobs:
  apply:
    if: ${{ github.ref_name == 'main' }}
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      D1_DATABASE: ${{ inputs.database }}
    steps:
      - name: Validate confirmation
        env:
          CONFIRM: ${{ inputs.confirm }}
        run: test "$CONFIRM" = "APLICAR"

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Check Cloudflare secrets
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_API_TOKEN"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Pin npm
        run: npm install -g npm@11.12.1

      - name: Print tool versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci --foreground-scripts

      - name: List remote D1 migrations
        working-directory: apps/web
        run: npx wrangler d1 migrations list "$D1_DATABASE" --remote

      - name: Apply remote D1 migrations
        working-directory: apps/web
        run: npx wrangler d1 migrations apply "$D1_DATABASE" --remote
