name: Recalc auto patch import modes

'on':
  push:
    branches:
      - main
    paths:
      - '.github/workflows/recalc-auto-patch-import-modes.yml'
      - 'scripts/patch-recalc-import-modes.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run patch script
        run: python scripts/patch-recalc-import-modes.py
      - name: Validate diff
        run: git diff --check
      - name: Commit patch
        run: |
          git config user.name "Code Forge Studio"
          git config user.email "actions@users.noreply.github.com"
          git add apps/web/src/lib/importers/prices-csv.ts \
            apps/web/src/app/api/admin/prices/import/[sessionId]/apply/route.ts \
            apps/web/src/components/admin/PricesClient.tsx \
            apps/web/src/lib/importers/academic-offer-replace.ts \
            apps/web/src/app/api/admin/import-academic-offer/[sessionId]/apply/route.ts \
            apps/web/src/components/admin/OfferImportClient.tsx
          git diff --cached --quiet || git commit -m "Add replace and batch update import modes for Recalc"
          git push
