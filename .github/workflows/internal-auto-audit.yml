name: Internal Auto Audit

on:
  workflow_dispatch:
    inputs:
      audit_run_id:
        description: Auto audit run id
        required: true
        type: string
      mode:
        description: Audit mode
        required: true
        default: standard
        type: choice
        options:
          - standard
          - deep

permissions:
  contents: read
  actions: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run internal audit
        run: npx tsx scripts/autopilot/run-internal-audit.ts
        env:
          AUTO_AUDIT_RUN_ID: ${{ inputs.audit_run_id }}
          AUTO_AUDIT_MODE: ${{ inputs.mode }}
          AUTO_AUDIT_OUTPUT_DIR: artifacts/autopilot/${{ inputs.audit_run_id }}

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auto-audit-report-${{ inputs.audit_run_id }}
          path: artifacts/autopilot/${{ inputs.audit_run_id }}/*
          if-no-files-found: error
