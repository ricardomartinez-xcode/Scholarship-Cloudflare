name: Fix Vercel parsed offer rows assignment

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch deduped campus rows assignment
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          before = "campus.rows = Array.from(deduped.values());"
          after = "campus.rows = Array.from(deduped.values()) as typeof campus.rows;"

          touched = []
          for root in ("apps", "packages"):
              base = Path(root)
              if not base.exists():
                  continue
              for path in base.rglob("*"):
                  if path.suffix not in {".ts", ".tsx", ".mts", ".cts"} or not path.is_file():
                      continue
                  text = path.read_text(encoding="utf-8")
                  if before not in text:
                      continue
                  updated = text.replace(before, after)
                  path.write_text(updated, encoding="utf-8")
                  touched.append(str(path))

          if not touched:
              raise SystemExit("No matching deduped campus.rows assignment found.")

          print("Patched files:")
          for item in touched:
              print(f"- {item}")
          PY

      - name: Remove one-off workflow and commit
        shell: bash
        run: |
          git config user.name "Code Forge Studio"
          git config user.email "actions@github.com"
          git rm .github/workflows/fix-vercel-parsed-offer-rows.yml
          git add apps packages
          git commit -m "Fix parsed offer rows assignment in Vercel build"
          git push
