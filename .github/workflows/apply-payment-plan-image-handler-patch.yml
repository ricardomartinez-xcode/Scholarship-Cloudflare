name: Apply payment plan image handler patch

on:
  workflow_dispatch:
    inputs:
      note:
        description: "Optional note"
        required: false
        type: string

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Insert missing payment plan image handler
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path("apps/web/src/components/ScholarshipCalculator.tsx")
          s = path.read_text()
          original = s

          if "const handleCopyPaymentPlanImage = useCallback" not in s:
            anchor = "]); return ( <>"
            handler = r"""]); const handleCopyPaymentPlanImage = useCallback(async (sectionTitle?: string) => {
            if (!paymentPlanSections.length) {
              setCopyQuoteImageStatus("No hay plan de pagos para exportar.");
              return;
            }

            setCopyQuoteImagePending(true);
            setCopyQuoteImageStatus(null);

            try {
              const sections = sectionTitle
                ? paymentPlanSections.filter((section) => section.title === sectionTitle)
                : paymentPlanSections;

              if (!sections.length) {
                throw new Error("No se encontró ese cuatrimestre.");
              }

              const width = 720;
              const padding = 32;
              const cardInner = 24;
              const cardRadius = 18;
              const scale = Math.max(3, window.devicePixelRatio || 3);
              const fontFamily = "Inter, Geist, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif";
              const sectionHeights = sections.map((section) => 92 + section.rows.length * 58);
              const height = padding * 2 + 84 + sectionHeights.reduce((total, value) => total + value, 0) + Math.max(0, sections.length - 1) * 18;

              const canvas = document.createElement("canvas");
              canvas.width = width * scale;
              canvas.height = height * scale;
              canvas.style.width = `${width}px`;
              canvas.style.height = `${height}px`;

              const ctx = canvas.getContext("2d");
              if (!ctx) throw new Error("No fue posible preparar la imagen.");

              ctx.scale(scale, scale);
              drawRoundedRect(ctx, 0.5, 0.5, width - 1, height - 1, 18, "#ffffff", "#c8d5df");
              ctx.fillStyle = "#55728b";
              ctx.font = `800 14px ${fontFamily}`;
              ctx.fillText("PLAN DE PAGOS", padding, padding + 16);

              ctx.fillStyle = "#17385f";
              ctx.font = `800 36px ${fontFamily}`;
              ctx.fillText(sectionTitle ?? "Todos los cuatrimestres", padding, padding + 62);

              let y = padding + 92;

              sections.forEach((section, sectionIndex) => {
                const sectionTotal = round2(section.rows.reduce((total, row) => total + row.amount, 0));
                const sectionHeight = sectionHeights[sectionIndex] ?? 160;

                drawRoundedRect(ctx, padding, y, width - padding * 2, sectionHeight, cardRadius, "#eef5f9", "#cbdce8");

                ctx.fillStyle = "#55728b";
                ctx.font = `800 14px ${fontFamily}`;
                ctx.fillText(section.title, padding + cardInner, y + 34);

                ctx.textAlign = "right";
                ctx.fillStyle = "#17385f";
                ctx.font = `800 22px ${fontFamily}`;
                ctx.fillText(formatMoney(sectionTotal), width - padding - cardInner, y + 34);
                ctx.textAlign = "left";

                let rowY = y + 72;
                section.rows.forEach((row) => {
                  ctx.fillStyle = "#17385f";
                  ctx.font = `700 18px ${fontFamily}`;
                  ctx.fillText(row.label, padding + cardInner, rowY);

                  ctx.fillStyle = "#668097";
                  ctx.font = `14px ${fontFamily}`;
                  ctx.fillText(row.detail, padding + cardInner, rowY + 21);

                  ctx.textAlign = "right";
                  ctx.fillStyle = "#17385f";
                  ctx.font = `800 18px ${fontFamily}`;
                  ctx.fillText(formatMoney(row.amount), width - padding - cardInner, rowY);
                  ctx.textAlign = "left";

                  rowY += 58;
                });

                y += sectionHeight + 18;
              });

              const blob = await new Promise<Blob | null>((resolve) => canvas.toBlob((value) => resolve(value), "image/png", 0.98));
              if (!blob) throw new Error("No fue posible generar la imagen.");

              if (navigator.clipboard?.write && typeof ClipboardItem !== "undefined") {
                await navigator.clipboard.write([new ClipboardItem({ [blob.type || "image/png"]: blob })]);
                setCopyQuoteImageStatus(sectionTitle ? "El cuatrimestre se copió como imagen." : "Los planes de pago se copiaron como imagen.");
                return;
              }

              const url = URL.createObjectURL(blob);
              const link = document.createElement("a");
              link.href = url;
              link.download = sectionTitle ? `plan-pago-${sectionTitle}.png` : `planes-pago-${Date.now()}.png`;
              link.click();
              URL.revokeObjectURL(url);
              setCopyQuoteImageStatus("Tu navegador no permitió copiar la imagen directo. Se descargó un PNG.");
            } catch (error) {
              setCopyQuoteImageStatus(error instanceof Error ? error.message : "No fue posible exportar el plan de pagos como imagen.");
            } finally {
              setCopyQuoteImagePending(false);
            }
          }, [paymentPlanSections]); return ( <>"""
                if anchor not in s:
                  raise SystemExit("Anchor not found")
            s = s.replace(anchor, handler, 1)

          if s == original:
            print("No changes needed")
          else:
            path.write_text(s)
          PY

      - name: Typecheck
        continue-on-error: true
        run: npm run typecheck

      - name: Commit changes
        shell: bash
        run: |
          git config user.name "Ricardo Martínez Hernández"
          git config user.email "ricardomartinez19b@icloud.com"
          git add apps/web/src/components/ScholarshipCalculator.tsx
          git diff --cached --quiet || git commit -m "Add payment plan image export handler"
          git push
