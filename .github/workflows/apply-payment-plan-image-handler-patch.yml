name: Apply payment plan image handler patch

on:
  workflow_dispatch:
    inputs:
      note:
        description: "Optional note"
        required: false
        type: string

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Insert missing payment plan image handler
        shell: bash
        run: |
          cat > /tmp/payment_plan_handler.txt <<'TS'
          ]); const handleCopyPaymentPlanImage = useCallback(async (sectionTitle?: string) => {
            const sections = sectionTitle
              ? paymentPlanSections.filter((section) => section.title === sectionTitle)
              : paymentPlanSections;
          
            if (!sections.length) {
              setCopyQuoteImageStatus("No hay plan de pagos para exportar.");
              return;
            }
          
            setCopyQuoteImagePending(true);
            setCopyQuoteImageStatus(null);
          
            try {
              const width = 720;
              const padding = 32;
              const scale = Math.max(3, window.devicePixelRatio || 3);
              const fontFamily = "Inter, Geist, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif";
              const rowHeight = 42;
              const sectionHeaderHeight = 58;
              const height = padding * 2 + 72 + sections.reduce((total, section) => total + sectionHeaderHeight + section.rows.length * rowHeight + 24, 0);
          
              const canvas = document.createElement("canvas");
              canvas.width = width * scale;
              canvas.height = height * scale;
              canvas.style.width = `${width}px`;
              canvas.style.height = `${height}px`;
          
              const ctx = canvas.getContext("2d");
              if (!ctx) throw new Error("No fue posible preparar la imagen.");
          
              ctx.scale(scale, scale);
              drawRoundedRect(ctx, 0.5, 0.5, width - 1, height - 1, 18, "#ffffff", "#c8d5df");
              ctx.fillStyle = "#55728b";
              ctx.font = `800 14px ${fontFamily}`;
              ctx.fillText("PLAN DE PAGOS", padding, padding + 16);
              ctx.fillStyle = "#17385f";
              ctx.font = `800 36px ${fontFamily}`;
              ctx.fillText(sectionTitle ?? "Todos los cuatrimestres", padding, padding + 60);
          
              let y = padding + 92;
              for (const section of sections) {
                const total = round2(section.rows.reduce((sum, row) => sum + row.amount, 0));
                const cardHeight = sectionHeaderHeight + section.rows.length * rowHeight;
                drawRoundedRect(ctx, padding, y, width - padding * 2, cardHeight, 18, "#eef5f9", "#cbdce8");
          
                ctx.fillStyle = "#55728b";
                ctx.font = `800 14px ${fontFamily}`;
                ctx.fillText(section.title, padding, + 24, y + 32);
                ctx.textAlign = "right";
                ctx.fillStyle = "#17385f";
                ctx.font = `800 20px ${fontFamily}`;
                ctx.fillText(formatMoney(total), width - padding - 24, y + 32);
                ctx.textAlign = "left";
          
                let rowY = y + sectionHeaderHeight;
                for (const row of section.rows) {
                  ctx.fillStyle = "#17385f";
                  ctx.font = `700 16px ${fontFamily}`;
                  ctx.fillText(row.label, padding + 24, rowY + 10);
                  ctx.fillStyle = "#668097";
                  ctx.font = `13px ${fontFamily}`;
                  ctx.fillText(row.detail, padding + 24, rowY + 28);
                  ctx.textAlign = "right";
                  ctx.fillStyle = "#17385f";
                  ctx.font = `800 16px ${fontFamily}`;
                  ctx.fillText(formatMoney(row.amount), width - padding - 24, rowY + 10);
                  ctx.textAlign = "left";
                  rowY += rowHeight;
                }
                y += cardHeight + 24;
              }
          
              const blob = await new Promise<Blob | null>((resolve) => canvas.toBlob((value) => resolve(value), "image/png", 0.98));
              if (!blob) throw new Error("No fue posible generar la imagen.");
          
              if (navigator.clipboard?.write && typeof ClipboardItem !== "undefined") {
                await navigator.clipboard.write([new ClipboardItem({ [blob.type || "image/png"]: blob })]);
                setCopyQuoteImageStatus(sectionTitle ? "El cuatrimestre se copió como imagen." : "Los planes de pago se copiaron como imagen.");
                return;
              }
          
              const url = URL.createObjectURL(blob);
              const link = document.createElement("a");
              link.href = url;
              link.download = sectionTitle ? `plan-pago-${sectionTitle}.png` : `planes-pago-${Date.now()}.png`;
              link.click();
              URL.revokeObjectURL(url);
              setCopyQuoteImageStatus("Tu navegador no permitió copiar la imagen directo. Se descargó un PNG.");
            } catch (error) {
              setCopyQuoteImageStatus(error instanceof Error ? error.message : "No fue posible exportar el plan de pagos como imagen.");
            } finally {
              setCopyQuoteImagePending(false);
            }
          }, [paymentPlanSections]); return ( <>
          TS
          python <<'PY'
          from pathlib import Path
          path = Path("apps/web/src/components/ScholarshipCalculator.tsx")
          s = path.read_text()
          if "const handleCopyPaymentPlanImage = useCallback" not in s:
              handler = Path("/tmp/payment_plan_handler.txt").read_text()
              marker = "setCopyQuoteImagePending(false);"
              start = s.find(marker)
              if start == -1:
                  print("marker not found")
              else:
                  anchor = "]); return ( <>"
                  idx = s.find(anchor, start)
                  if idx == -1:
                      print("anchor not found")
                  else:
                      s = s[:idx] + handler + s[idx + len(anchor):]
                      path.write_text(s)
                      print("handler inserted")
          else:
              print("handler already exists")
          PY

      - name: Commit changes
        shell: bash
        run: |
          git config user.name "Ricardo Martínez Hernández"
          git config user.email "ricardomartinez19b@icloud.com"
          git add apps/web/src/components/ScholarshipCalculator.tsx
          git diff --cached --quiet || git commit -m "Add payment plan image export handler"
          git push
