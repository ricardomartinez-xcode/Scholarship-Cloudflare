name: Patch Recalc update import modes

on:
  workflow_dispatch:
    inputs:
      note:
        description: "Optional note"
        required: false
        type: string

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch prices and offer import modes
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              p2ł = Path(path)
              s = p.read_text(encoding="utf-8")
              if old not in s:
                  raise RuntimeError(f"Pattern not found in {path}:\n{old[:500]}")
              p.write_text(s.replace(old, new, 1), encoding="utf-8")
              print(f"patched {path}")

          def replace_all(path: str, old: str, new: str) -> None:
              p = Path(path)
              s = p.read_text(encoding="utf-8")
              if old not in s:
                  raise RuntimeError(f"Pattern not found in {path}: {old}")
              p.write_text(s.replace(old, new), encoding="utf-8")
              print(f"patched {path}")

          prices_client = "apps/web/src/components/admin/PricesClient.tsx"
          offer_client = "apps/web/src/components/admin/OfferImportClient.tsx"
          prices_csv = "apps/web/src/lib/importers/prices-csv.ts"
          prices_apply = "apps/web/src/app/api/admin/prices/import/[sessionId]/apply/route.ts"
          offer_replace = "apps/web/src/lib/importers/academic-offer-replace.ts"
          offer_apply = "apps/web/src/app/api/admin/import-academic-offer/[sessionId]/apply/route.ts"

          # ---------------- Prices UI ----------------
          replace_once(
              prices_client,
              'type PricePanel = "list" | "imports";',
              'type PricePanel = "list" | "imports";\ntype PriceImportApplyMode = "replace" | "update-only";',
          )
          replace_once(
              prices_client,
              'async function applyImportSession() {',
              'async function applyImportSession(mode: PriceImportApplyMode = "replace") {',
          )
          replace_once(
              prices_client,
              'fetch(`/api/admin/prices/import/${importSessionId}/apply`, {',
              'fetch(`/api/admin/prices/import/${importSessionId}/apply?mode=${mode}`, {',
          )
          replace_all(prices_client, '{ id: "imports", label: "Importaci├│n" }', '{ id: "imports", label: "Actualizaci├│n" }')
          replace_all(prices_client, 'Importar precio lista', 'Actualizar precios')
          replace_all(
              prices_client,
              'Importa archivos XLSX o CSV con el orden can├│nico de precio. Se genera preview\n              de diff antes de aplicar cambios.',
              'Carga un XLSX o CSV. Usa Actualizar precios para borrar los precios anteriores y subir estos nuevos, o Actualizar lote para modificar solo precios existentes.',
          )
          replace_once(
              prices_client,
              'onClick={applyImportSession}',
              'onClick={() => void applyImportSession("replace")}',
          )
          replace_once(
              prices_client,
              '{applyImportLoading ? "Aplicando..." : "Aplicar"}',
              '{applyImportLoading ? "Actualizando..." : "Actualizar precios"}',
          )
          replace_once(
              prices_client,
              '''            <button
              type="button"
              onClick={rollbackImportSession}''',
              '''            <button
              type="button"
              onClick={() => void applyImportSession("update-only")}
              disabled={Boolean(
                !importSessionId || applyImportLoading || importSummary?.errors?.length,
              )}
              className="rounded-xl border border-amber-500/40 bg-amber-500/15 px-3 py-1.5 text-xs font-semibold text-amber-100 transition hover:bg-amber-500/25 disabled:opacity-60"
            >
              {applyImportLoading ? "Actualizando..." : "Actualizar lote"}
            </button>
            <button
              type="button"
              onClick={rollbackImportSession}''',
          )

          # ---------------- Prices backend ----------------
          replace_once(
              prices_apply,
              '''    const summary = await applyPreparedPricesImport({\n      payload: session.payload as PreparedPricesImportPayload,\n      updatedBy: auth.admin.email,\n    });''',
              '''    const applyMode = new URL(request.url).searchParams.get("mode") === "update-only" ? "update-only" : "replace";\n    const summary = await applyPreparedPricesImport({\n      payload: session.payload as PreparedPricesImportPayload,\n      updatedBy: auth.admin.email,\n      mode: applyMode,\n    });''',
          )
          replace_once(
              prices_csv,
              '''export type PricesImportApplySummary = {\n  processed: number;\n  created: number;\n  updated: number;\n  unchanged: number;\n};\n\ntype ParsedPriceRow = {'#'',
              '''export type PricesImportApplySummary = {\n  processed: number;\n  created: number;\n  updated: number;\n  unchanged: number;\n};\n\nexport type PricesImportApplyMode = "replace" | "update-only";\n\ntype ParsedPriceRow = {''',
          )
          replace_once(
              prices_csv,
              '''export async function applyPreparedPricesImport(params: {\n  payload: PreparedPricesImportPayload;\n  updatedBy: string;\n}): Promise<PricesImportApplySummary> {'#'',
              '''export async function applyPreparedPricesImport(params: {\n  payload: PreparedPricesImportPayload;\n  updatedBy: string;\n  mode?: PricesImportApplyMode;\n}): Promise<PricesImportApplySummary> {''',
          )
          replace_once(
              prices_csv,
              '''  const rows = params.payload.rows ?? [];\n  let created = 0;''',
              '''  const rows = params.payload.rows ?? [];\n  const mode = params.mode ?? "replace";\n  let created = 0;''',
          )
          replace_once(
              prices_csv,
              '''  await prisma.$transaction(async (tx) => {\n    for (const row of rows) {'#'',
              '''  await prisma.$transaction(async (tx) => {\n    if (mode === "replace") {\n      await tx.adminPriceOverride.deleteMany({ where: { scope: "base_price" } });\n    }\n\n    for (const row of rows) {\n      if (mode === "update-only" && row.action === "create") {\n        throw new PricesCsvValidationError(\n          `Actualizar lote no puede crear precios nuevos. Revisa la fila ${row.rowNumber}.`,\n          "UPDATE_ONLY_CANNOT_CREATE_PRICE",\n        );\n      }''',
          )
          replace_once(prices_csv, '      if (row.action === "noop") {', '      if (row.action === "noop" && mode !== "replace") {')
          replace_once(prices_csv, '      let existingId = row.existingId ?? null;', '      let existingId = mode === "replace" ? null : row.existingId ?? null;')

          # ---------------- Offer UI ----------------
          replace_once(
              offer_client,
              'type OfferPanel = "list" | "imports";',
              'type OfferPanel = "list" | "imports";\ntype OfferImportApplyMode = "replace" | "update-only";',
          )
          replace_once(
              offer_client,
              'async function applyImport() {',
              'async function applyImport(mode: OfferImportApplyMode = "replace") {',
          )
          replace_once(
              offer_client,
              'fetch(`/api/admin/import-academic-offer/${sessionId}/apply`, { method: "POST" });',
              'fetch(`/api/admin/import-academic-offer/${sessionId}/apply?mode=${mode}`, { method: "POST" });',
          )
          replace_all(offer_client, '{ id: "imports", label: "Importaci├│n" }', '{ id: "imports", label: "Actualizaci├│n" }')
          replace_all(offer_client, 'importa cambios masivos por XLSX/CSV', 'actualiza oferta por reemplazo o lote desde XLSX/CSV')
          replace_all(offer_client, 'Importar oferta por planteles', 'Actualizar oferta por planteles')
          replace_all(
              offer_client,
              'Importa archivos XLSX o CSV. La sesi├│n primero valida y previsualiza; despu├®s puedes aplicar al draft y publicar cuando el diff est├® aprobado.',
              'Carga un XLSX o CSV. Usa Actualizar oferta para borrar la oferta anterior del ciclo y subir esta nueva, o Actualizar lote para modificar solo ofertas existentes.',
          )
          replace_all(offer_client, 'Ciclo a importar', 'Ciclo a actualizar')
          replace_once(
              offer_client,
              '''{sessionId && !applied && !rolledBack ? <button type="button" onClick={applyImport} disabled={applyLoading} className="rounded-xl border border-emerald-500/40 bg-emerald-500/15 px-3 py-1.5 text-xs font-semibold text-emerald-100 transition hover:bg-emerald-500/25 disabled:opacity-60">{applyLoading ? "Aplicando..." : "Aplicar al draft"}</button> : null}''',
              '''{sessionId && !applied && !rolledBack ? (\n                  <>\n                    <button type="button" onClick={() => void applyImport("replace")} disabled={applyLoading} className="rounded-xl border border-emerald-500/40 bg-emerald-500/15 px-3 py-1.5 text-xs font-semibold text-emerald-100 transition hover:bg-emerald-500/25 disabled:opacity-60">{applyLoading ? "Actualizando..." : "Actualizar oferta"}</button>\n                    <button type="button" onClick={() => void applyImport("update-only")} disabled={applyLoading} className="rounded-xl border border-amber-500/40 bg-amber-500/15 px-3 py-1.5 text-xs font-semibold text-amber-100 transition hover:bg-amber-500/25 disabled:opacity-60">{applyLoading ? "Actualizando..." : "Actualizar lote"}</button>\n                  </>\n                ) : null}''',
          )
          replace_all(offer_client, 'aplicada al draft', 'actualizada')

          # ---------------- Offer backend ----------------
          replace_once(
              offer_apply,
              '''    const summary = await applyPreparedAcademicOfferImport({\n      payload: session.payload as unknown as PreparedAcademicOfferImportPayload,\n      updatedBy: admin.email,\n    });''',
              '''    const applyMode = new URL(request.url).searchParams.get("mode") === "update-only" ? "update-only" : "replace";\n    const summary = await applyPreparedAcademicOfferImport({\n      payload: session.payload as unknown as PreparedAcademicOfferImportPayload,\n      updatedBy: admin.email,\n      mode: applyMode,\n    });''',
          )
          replace_all(offer_apply, 'replacementMode: true', 'replacementMode: applyMode === "replace",\n        applyMode')
          replace_once(
              offer_replace,
              '''export type { PreparedAcademicOfferImportPayload } from "./academic-offer";\n\ntype ParsedCampus = PreparedAcademicOfferImportPayload["parsed"][number];''',
              '''export type { PreparedAcademicOfferImportPayload } from "./academic-offer";\n\nexport type AcademicOfferImportApplyMode = "replace" | "update-only";\n\ntype ParsedCampus = PreparedAcademicOfferImportPayload["parsed"][number];''',
          )
          replace_once(
              offer_replace,
              '''async function upsertProgramsForImport(\n  seeds: Map<string, ProgramSeed>,\n  summary: ImportAcademicOfferSummary,\n): Promise<ProgramIdByNormalizedName> {''',
              '''async function upsertProgramsForImport(\n  seeds: Map<string, ProgramSeed>,\n  summary: ImportAcademicOfferSummary,\n  options?: { allowCreate?: boolean },\n): Promise<ProgramIdByNormalizedName> {''',
          )
          replace_once(
              offer_replace,
              '''    if (!existing) {\n      const created = await prisma.program.create({''',
              '''    if (!existing) {\n      if (options?.allowCreate === false) {\n        throw new Error(`Actualizar lote no puede crear programas nuevos: ${program.name}.`);\n      }\n      const created = await prisma.program.create({''',
          )
          replace_once(
              offer_replace,
              '''export async function applyPreparedAcademicOfferImport(params: {\n  payload: PreparedAcademicOfferImportPayload;\n  updatedBy: string;\n}): Promise<ImportAcademicOfferSummary> {'#'',
              '''export async function applyPreparedAcademicOfferImport(params: {\n  payload: PreparedAcademicOfferImportPayload;\n  updatedBy: string;\n  mode?: AcademicOfferImportApplyMode;\n}): Promise<ImportAcademicOfferSummary> {'#'',
          )
          replace_once(
              offer_replace,
              '''  const programSeeds = getProgramSeeds(params.payload);\n  const programIds = await upsertProgramsForImport(programSeeds, summary);\n  const replacementRows = buildReplacementOfferRows(params.payload, programIds);''',
              '''  const mode = params.mode ?? "replace";\n  const programSeeds = getProgramSeeds(params.payload);\n  const programIds = await upsertProgramsForImport(programSeeds, summary, { allowCreate: mode !== "update-only" });\n  const replacementRows = buildReplacementOfferRows(params.payload, programIds);''',
          )
          replace_once(
              offer_replace,
              '''    const deleted = await tx.programOffering.deleteMany({\n      where: { cycle: params.payload.cycle },\n    });\n\n    if (replacementRows.length > 0) {''',
              '''    if (mode === "update-only") {\n      const updatedByCampus = new Map<string, number>();\n\n      for (const item of replacementRows) {\n        const existing = await tx.programOffering.findFirst({\n          where: {\n            cycle: params.payload.cycle,\n            campusId: item.campusId,\n            programId: item.programId,\n            track: item.row.module,\n          },\n          select: { id: true },\n        });\n\n        if (!existing) {\n          throw new Error(\n            `Actualizar lote no puede crear oferta nueva: ${item.campusName} ┬Ę ${item.row.programName} ┬Ę ${item.row.module}.`,\n          );\n        }\n\n        const isOnline = item.row.delivery === "ONLINE";\n        await tx.programOffering.update({\n          where: { id: existing.id },\n          data: {\n            delivery: isOnline\n              ? ProgramOfferingDelivery.ONLINE\n              : ProgramOfferingDelivery.CAMPUS,\n            escolarizado: isOnline ? false : item.row.escolarizado,\n            ejecutivo: isOnline ? false : item.row.ejecutivo,\n            escolarizadoSchedule: isOnline ? null : item.row.escolarizadoSchedule,\n            ejecutivoSchedule: isOnline ? null : item.row.ejecutivoSchedule,\n            lineOfBusiness: item.row.lineOfBusiness,\n            pricingPlans: item.row.pricingPlans ?? [],\n            track: item.row.module,\n            moduleCount: item.row.moduleCount,\n            subjectsByModule: item.row.subjectsByModule,\n            isActive: true,\n            archivedAt: null,\n            archivedReason: null,\n            updatedBy: params.updatedBy,\n          },\n        });\n\n        summary.offerings.updated += 1;\n        updatedByCampus.set(item.campusId, (updatedByCampus.get(item.campusId) ?? 0) + 1);\n      }\n\n      summary.campusesProcessed = params.payload.parsed.length;\n      for (const campus of params.payload.parsed) {\n        summary.perCampus.push({\n          campusCode: campus.campusCode,\n          campusName: campus.campusNameFromExcel ?? campus.campusCode,\n          sheetName: campus.sheetName,\n          source: campus.source,\n          rows: campus.rows.length,\n          offeringsCreated: 0,\n          offeringsUpdated: updatedByCampus.get(campus.campusId) ?? 0,\n          offeringsReactivated: 0,\n          offeringsDeactivated: 0,\n        });\n      }\n\n      return;\n    }\n\n    const deleted = await tx.programOffering.deleteMany({\n      where: { cycle: params.payload.cycle },\n    });\n\n    if (replacementRows.length > 0) {'#'',
          )

          print("All patches applied.")
          PY

      - name: Validate patch
        shell: bash
        run: |
          git diff --check
          git diff -- apps/web/src/components/admin/PricesClient.tsx \
            apps/web/src/components/admin/OfferImportClient.tsx \
            apps/web/src/lib/importers/prices-csv.ts \
            apps/web/src/lib/importers/academic-offer-replace.ts \
            apps/web/src/app/api/admin/prices/import/[sessionId]/apply/route.ts \
            apps/web/src/app/api/admin/import-academic-offer/[sessionId]/apply/route.ts

      - name: Commit changes
        shell: bash
        run: |
          git config user.name "Ricardo Mart├Łnez Hern├Īndez"
          git config user.email "ricardomartinez19b@icloud.com"
          git add apps/web/src/components/admin/PricesClient.tsx \
            apps/web/src/components/admin/OfferImportClient.tsx \
            apps/web/src/lib/importers/prices-csv.ts \
            apps/web/src/lib/importers/academic-offer-replace.ts \
            apps/web/src/app/api/admin/prices/import/[sessionId]/apply/route.ts \
            apps/web/src/app/api/admin/import-academic-offer/[sessionId]/apply/route.ts
          git diff --cached --quiet || git commit -m "Add replace and batch update import modes"
          git push
