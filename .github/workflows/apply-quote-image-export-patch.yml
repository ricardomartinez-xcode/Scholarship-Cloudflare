name: Apply quote image export patch

on:
  workflow_dispatch:
    inputs:
      note:
        description: "Optional note"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: apply-quote-image-export-patch
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply patch
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          
          path = Path("apps/web/src/components/ScholarshipCalculator.tsx")
          s = path.read_text()
          original = s

          replacements = {
            "const width = 408;": "const width = 720;",
            "const padding = 18;": "const padding = 32;",
            "const cardRadius = 8;": "const cardRadius = 18;",
            "const cardGap = 16;": "const cardGap = 24;",
            "const scale = Math.min(window.devicePixelRatio || 2, 2);": "const scale = Math.max(3, window.devicePixelRatio || 3);",
            "const bodyFont = `14px ${fontFamily}`;": "const bodyFont = `18px ${fontFamily}`;",
            "const smallFont = `12px ${fontFamily}`;": "const smallFont = `14px ${fontFamily}`;",
            "const rowFont = `14px ${fontFamily}`;": "const rowFont = `18px ${fontFamily}`;",
            "const strongFont = `700 16px ${fontFamily}`;": "const strongFont = `800 22px ${fontFamily}`;",
            "const cardInner = 16;": "const cardInner = 24;",
            "const amountColumnWidth = 112;": "const amountColumnWidth = 180;",
            "max: 42, min: 30": "max: 68, min: 48",
            "const heroHeight = Math.max( 153,": "const heroHeight = Math.max( 220,",
            "const firstPaymentHeight = resultPanelFirstPaymentAmount > 0 ? Math.max( 122,": "const firstPaymentHeight = resultPanelFirstPaymentAmount > 0 ? Math.max( 160,",
            "const breakdownHeight = 50 + detailRowsHeight;": "const breakdownHeight = 68 + detailRowsHeight;",
            "ctx.fillText(\"C | O | T | I | Z | A | C | I | ó | N\".replace(/\\ |\ /g, \" \"), padding, padding + 12);": "ctx.fillText(\"COTIZACIÓN\", padding, padding + 16);",
            "ctx.fillText(\"C | O | S | T | O M | E | N | S | U | A | L\".replace(/\\ |\ /g, \" \"), padding + cardInner, y + 28);": "ctx.fillText(\"COSTO MENSUAL\", padding + cardInner, y + 36);",
            "ctx.fillText(heroAmount, padding + cardInner, y + 78);": "ctx.fillText(heroAmount, padding + cardInner, y + 116);",
            "y + 104 + index * 22": "y + 152 + index * 26",
            "ctx.fillText(\"P | R | I | M | E | R P | A | G | O\".replace(/\\ |\\ /g, \" \"), padding + cardInner, y + 26);": "ctx.fillText(\"PRIMER PAGO\", padding + cardInner, y + 36);",
            "y + 54": "y + 72",
            "let noteY = y + 78;": "let noteY = y + 104;",
            "ctx.fillText(\"D | E | S | G | L | O | S\".replace(/\\ |\\ /g, \" \"), padding + cardInner, y + 28);": "ctx.fillText(\"DESGLOSE\", padding + cardInner, y + 36);",
            "y += 50;": "y += 68;",
            "row.strong ? 44 : 30": "row.strong ? 72 : 42",
            "8 + labelLines.length * 20 + mutedLines.length * 16": "16 + labelLines.length * 24 + mutedLines.length * 18",
            "y + 20 + index * 20": "y + (row.strong ? 36 : 24) + index * 24",
            "y + 20);": "y + (row.strong ? 36 : 24));",
            "y + 22 + row.labelLines.length * 20": "y + 30 + row.labelLines.length * 24",
            "y + 2 + row.labelLines.length * 20": "y + 10 + row.labelLines.length * 24",
          }

          for old, new in replacements.items():
              if old in s:
                s = s.replace(old, new, 1)

          insert_after = "]); return ( <>"
          handler = """
          ); const handleCopyPaymentPlanImage = useCallback(async (sectionTitle?: string) => {
            if (!paymentPlanSections.length) { setCopyQuoteImageStatus("No hay plan de pagos para exportar."); return; }
            setCopyQuoteImagePending(true);
            setCopyQuoteImageStatus(null);
            try {
              const sections = sectionTitle ? paymentPlanSections.filter((section) => section.title === sectionTitle) : paymentPlanSections;
              if (!sections.length) { throw new Error("No se encontró ese cuatrimestre."); }
              const width = 720;
              const padding = 32;
              const cardInner = 24;
              const cardRadius = 18;
              const scale = Math.max(3, window.devicePixelRatio || 3);
              const fontFamily = "Inter, Geist, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif";
              const sectionHeights = sections.map((section) => 86 + section.rows.length * 56);
              const height = padding * 2 + 78 + sectionHeights.reduce((total, value) => total + value, 0) + sections.length * 18;
              const canvas = document.createElement("canvas");
              canvas.width = width * scale;
              canvas.height = height * scale;
              canvas.style.width = `${width}px`;
              canvas.style.height = `${height}px`;
              const ctx = canvas.getContext("2d");
              if (!ctx) { throw new Error("No fue posible preparar la imagen."); }
              ctx.scale(scale, scale);
              drawRoundedRect(ctx, 0.5, 0.5, width - 1, height - 1, 18, "#ffffff", "#c8d5df");
              ctx.fillStyle = "#55728b"; ctx.font = `800 14px ${fontFamily}`;
              ctx.fillText("PLAN DE PAGOS", padding, padding + 16);
              ctx.fillStyle = "#17385f"; ctx.font = `800 36px ${fontFamily}`;
              ctx.fillText(sectionTitle ?? "Todos los cuatrimestres", padding, padding + 60);
              let y = padding + 88;
              sections.forEach((section) => {
                const sectionTotal = round2(section.rows.reduce((total, row) => total + row.amount, 0));
                const sectionHeight = 86 + section.rows.length * 56;
                drawRoundedRect(ctx, padding, y, width - padding * 2, sectionHeight, cardRadius, "#eef5f9", "#cbdce8");
                ctx.fillStyle = "#55728b"; ctx.font = `800 14px ${fontFamily}`; ctx.fillText(section.title, padding + cardInner, y + 32);
                ctx.textAlign = "right"; ctx.fillStyle = "#17385f"; ctx.font = `800 20px ${fontFamily}`; ctx.fillText(formatMoney(sectionTotal), width - padding - cardInner, y + 32); ctx.textAlign = "left";
                let y 2 = y + 68;
                section.rows.forEach((row) => {
                  ctx.fillStyle = "#17385f"; ctx.font = `600 18px ${fontFamily}`; ctx.fillText(row.label, padding + cardInner, y2);
                  ctx.fillStyle = "#668097"; ctx.font = `14px ${fontFamily}`; ctx.fillText(row.detail, padding + cardInner, y2 + 20);
                  ctx.textAlign = "right"; ctx.fillStyle = "#17385f"; ctx.font = `700 18px ${fontFamily}`; ctx.fillText(formatMoney(row.amount), width - padding - cardInner, y2); ctx.textAlign = "left";
                  y2 += 56;
                });
                y += sectionHeight + 18;
              });
              const blob = await new Promise<Blob | null>((resolve) => canvas.toBlob((value) => resolve(value), "image/png", 0.98));
              if (!blob) { throw new Error("No fue posible generar la image."); }
              if (navigator.clipboard?.write && typeof ClipboardItem !== "undefined") {
                await navigator.clipboard.write([ new ClipboardItem({ [blob.type || "image/png"]: blob }), ]);
                setCopyQuoteImageStatus(sectionTitle ? "El cuatrimestre se copió como imagen." : "Los planes de pago se copiaron como imagen.");
                return;
              }
              const url = URL.createObjectURL(blob); const link = document.createElement("a"); link.href = url; link.download = sectionTitle ? `plan-pago-${sectionTitle}.png` : `planes-pago-${Date.now()}.png`; link.click(); URL.revokeObjectURL(url);
              setCopyQuoteImageStatus("Tu navegador no permitió copiar la imagen directo. Se descargó un PNG.");
            } catch (error) {
              setCopyQuoteImageStatus(error instanceof Error ? error.message : "No fue posible exportar el plan de pagos como imagen.");
            } finally {
              setCopyQuoteImagePending(false);
            }
          }, [paymentPlanSections]); return ( <>
          """
          if insert_after in s:
              s = s.replace(insert_after, handler, 1)
          else:
              raise SystemExit("Could not insert payment plan handler")

          s = s.replace(
            'Miestra mensualidades y pagos de incorporación por cuatrimestre.',
            'Miestra mensualidades y pagos de incorporación por cuatrimestre. <div className="mt-4 flex flex-wrap gap-2"><button type="button" onClick={() => void handleCopyPaymentPlanImage()} disabled={copyQuoteImagePending} className="ui-button-secondary min-h-9 rounded-full px-4 py-2 text-xs font-semibold uppercase tracking-[0.12em] disabled:opacity-60">Copiar todos los planes</button></div>',
            3,
          )

          s = s.replace(
            '{formatMoney(sectionTotal)}',
            '{formatMoney(sectionTotal)} <button type="button" onClick={() => void handleCopyPaymentPlanImage(section.title)} disabled={copyQuoteImagePending} className="ui-button-secondary ml-3 min-h-7 rounded-full px-3 py-1 text-[x0a]5">Copiar imagen</button>',
            2,
          )

          if s == original:
              raise SystemExit("Patch did not change file")
          path.write_text(s)
          PY

      - name: Typecheck (best effort)
        continue-on-error: true
        run: npm run typecheck

      - name: Commit changes
        shell: bash
        run: |
          git config user.name "Ricardo Martínez Hernández"
          git config user.email "ricardomartinez19b@icloud.com"
          git add apps/web/src/components/ScholarshipCalculator.tsx
          git diff --cached --quiet ||| git commit -m "Improve quote and payment plan image exports"
          git push
