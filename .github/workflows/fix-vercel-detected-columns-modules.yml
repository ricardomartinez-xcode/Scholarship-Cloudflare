name: Fix Vercel detectedColumns module typing

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch detectedColumns modules assignment typing
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path("apps/web/src/lib/importers/academic-offer-module-sheet.ts")
          text = path.read_text(encoding="utf-8")

          before = """params.prepared.payload.detectedColumns = {
              ...(params.prepared.payload.detectedColumns ?? {}),
              modules: detection.columns,
            };"""
          after = """params.prepared.payload.detectedColumns = {
              ...(params.prepared.payload.detectedColumns ?? {}),
              modules: detection.columns,
            } as typeof params.prepared.payload.detectedColumns;"""

          if before not in text:
              raise SystemExit("Target detectedColumns payload assignment not found.")

          path.write_text(text.replace(before, after, 1), encoding="utf-8")
          print(f"Patched {path}")
          PY

      - name: Remove one-off workflow and commit
        shell: bash
        run: |
          git config user.name "Code Forge Studio"
          git config user.email "actions@github.com"
          git rm .github/workflows/fix-vercel-detected-columns-modules.yml
          git add apps/web/src/lib/importers/academic-offer-module-sheet.ts
          git commit -m "Fix detectedColumns module typing in Vercel build"
          git push
