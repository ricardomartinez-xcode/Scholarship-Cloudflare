name: D1 Migration Readiness

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Fuente a auditar; por seguridad sólo se admite main"
        required: true
        default: "main"
        type: string
      confirmation:
        description: "Escribe READONLY para ejecutar consultas remotas sin mutaciones"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: d1-readonly-readiness-${{ inputs.ref }}
  cancel-in-progress: false

jobs:
  audit:
    if: inputs.ref == 'main' && inputs.confirmation == 'READONLY'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout trusted source
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Verify Cloudflare credentials are configured
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_API_TOKEN"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Pin npm
        run: npm install -g npm@11.12.1

      - name: Print tool versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci --foreground-scripts

      - name: Enforce read-only audit SQL
        run: |
          ! grep -Ein '(^|;)\s*(INSERT|UPDATE|DELETE|CREATE|ALTER|DROP|REPLACE|VACUUM|ATTACH|DETACH|BEGIN|COMMIT|ROLLBACK)\b' apps/web/scripts/d1-preflight.sql

      - name: Capture local migration manifest
        run: |
          mkdir -p artifacts/d1-readiness
          find apps/web/migrations -maxdepth 1 -type f -name '*.sql' -printf '%f\n' | sort > artifacts/d1-readiness/local-migrations.txt
          cut -d_ -f1 artifacts/d1-readiness/local-migrations.txt | sort | uniq -d > artifacts/d1-readiness/duplicate-prefixes.txt || true

      - name: Capture remote D1 migration state
        working-directory: apps/web
        run: |
          npx wrangler d1 migrations list recalc-cloudflare --remote | tee ../../artifacts/d1-readiness/remote-migrations.txt

      - name: Capture baseline schema and referential integrity
        working-directory: apps/web
        run: |
          npx wrangler d1 execute recalc-cloudflare --remote --file=scripts/d1-preflight.sql --json > ../../artifacts/d1-readiness/d1-preflight.json

      - name: Audit core table availability and counts
        working-directory: apps/web
        run: |
          : > ../../artifacts/d1-readiness/core-counts.ndjson
          for table in campus program program_offering academic_fee cloudflare_auth_user cloudflare_auth_session; do
            output="../../artifacts/d1-readiness/core-count-${table}.json"
            error="../../artifacts/d1-readiness/core-count-${table}.stderr"
            if npx wrangler d1 execute recalc-cloudflare --remote --command "SELECT '${table}' AS table_name, COUNT(*) AS row_count FROM \"${table}\"" --json > "$output" 2> "$error"; then
              printf '{"table":"%s","status":"present"}\n' "$table" >> ../../artifacts/d1-readiness/core-counts.ndjson
            else
              printf '{"table":"%s","status":"missing_or_unqueryable"}\n' "$table" >> ../../artifacts/d1-readiness/core-counts.ndjson
            fi
          done

      - name: Publish non-secret readiness summary
        if: always()
        run: |
          {
            echo "## D1 Migration Readiness"
            echo
            echo "- Source: \`${{ github.sha }}\`"
            echo "- Mode: remote read-only audit"
            echo "- SQL guard blocks mutating statements before Wrangler is invoked."
            echo "- Reports: local manifest, duplicate prefixes, remote migration state, schema, foreign-key check and per-table core counts."
            echo "- Missing tables are recorded as readiness findings instead of aborting the evidence collection."
            echo "- No migration, import, data mutation or Worker deploy is performed by this workflow."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload readiness evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: d1-readiness-${{ github.run_id }}
          path: artifacts/d1-readiness
          if-no-files-found: warn
          retention-days: 14
